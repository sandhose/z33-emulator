# $schema: https://www.schemastore.org/pnpm-workspace.json

packages:
  - web
  - vscode

ignoredBuiltDependencies:
  - esbuild
  - msw

onlyBuiltDependencies:
  - "@vscode/vsce-sign"
  - keytar

strictDepBuilds: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - semver
  - reselect@5.1.1
