id = "z33"
name = "Z33 Assembly"
version = "0.8.0"
schema_version = 1
authors = ["Quentin Gliech <gliech@unistra.fr>"]
description = "Z33 (Zorglub-33) assembly language support"
repository = "https://github.com/sandhose/z33-emulator"

[language_servers.z33-lsp]
name = "Z33 LSP"
languages = ["Z33 Assembly"]

[debug_adapters.z33]
# Uses the default schema path: debug_adapter_schemas/z33.json

# The tree-sitter grammar lives in this same repository under `tree-sitter-z33/`.
# Zed fetches the grammar from the repository at `rev` and compiles the
# `parser.c` found at `path`. `rev` is refreshed by scripts/set-version.sh on
# each release.
[grammars.z33]
repository = "https://github.com/sandhose/z33-emulator"
rev = "b9a7e3429978c99b4dc951be193b2ca4a7297066"
path = "tree-sitter-z33"
