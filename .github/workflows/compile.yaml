on:
  push:
    branches: [main]
    tags: ["v*"]
  # The Release workflow dispatches this one on release branches (to satisfy
  # the required status checks) and on fresh tags (to build and publish),
  # because events created with GITHUB_TOKEN don't trigger workflows.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

permissions:
  contents: read

name: Compile

jobs:
  build-macos:
    name: Build for macOS ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    env:
      SDKROOT: /opt/MacOSX11.3.sdk

    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64
          - x86_64

    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Add the Rust target
        run: rustup target add ${{ matrix.arch }}-apple-darwin

      - name: Install zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1

      - name: Install cargo-zigbuild
        run: pipx install cargo-zigbuild

      - name: Download the macOS SDK
        run: curl -L "https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX11.3.sdk.tar.xz" | tar -J -x -C /opt

      - name: Build the binary
        run: cargo zigbuild --release --target=${{ matrix.arch }}-apple-darwin -p z33-cli

      - name: Create the archive
        run: tar -czvf z33-cli-${{ matrix.arch }}-macos.tar.gz --owner=0 --group=0 -C target/${{ matrix.arch }}-apple-darwin/release/ z33-cli

      - name: Upload the binary as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.arch }}-macos
          path: z33-cli-${{ matrix.arch }}-macos.tar.gz

  build-linux:
    name: Build for Linux ${{ matrix.arch }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64
          - x86_64

    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Add the Rust target
        run: rustup target add ${{ matrix.arch }}-unknown-linux-musl

      - name: Install zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1

      - name: Install cargo-zigbuild
        run: pipx install cargo-zigbuild

      - name: Build the binary
        run: cargo zigbuild --release --target=${{ matrix.arch }}-unknown-linux-musl -p z33-cli

      - name: Create the archive
        run: tar -czvf z33-cli-${{ matrix.arch }}-linux.tar.gz --owner=0 --group=0 -C target/${{ matrix.arch }}-unknown-linux-musl/release/ z33-cli

      - name: Upload the binary as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.arch }}-linux
          path: z33-cli-${{ matrix.arch }}-linux.tar.gz

  build-windows:
    name: Build for Windows ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    env:
      XWIN_ARCH: ${{ matrix.arch }}
      XWIN_VARIANT: onecore
      XWIN_CACHE_DIR: ./cargo-xwin

    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64

    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Add the Rust target
        run: rustup target add ${{ matrix.arch }}-pc-windows-msvc

      - name: Restore cargo-xwin cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: cargo-xwin
          key: cargo-xwin-${{ matrix.arch }}

      - name: Save cargo-xwin cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: cargo-xwin
          key: cargo-xwin-${{ matrix.arch }}

      - name: Install cargo-xwin
        run: pipx install cargo-xwin

      - name: Build the binary
        run: cargo xwin build --release --target=${{ matrix.arch }}-pc-windows-msvc -p z33-cli

      - name: Move the binary
        run: mv target/${{ matrix.arch }}-pc-windows-msvc/release/z33-cli.exe ./z33-cli-${{ matrix.arch }}-windows.exe

      - name: Upload the binary as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.arch }}-windows
          path: z33-cli-${{ matrix.arch }}-windows.exe

  vsix:
    name: Package the VS Code extension
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json

      # No build cache here: this job produces a release artifact (zizmor: cache-poisoning)
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"

      # wasm-pack comes from the `z33-assembly` (vscode) package's devDependency
      # — that is the one `pnpm --filter z33-assembly run build` resolves via its
      # `build:wasm` script — so no separate install action is needed.
      - name: Install dependencies
        run: pnpm i

      - name: Build the extension
        run: pnpm --filter z33-assembly run build

      - name: Package the extension
        run: npx vsce package --no-dependencies --out z33-assembly.vsix
        working-directory: editors/vscode

      - name: Upload the .vsix as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode-extension
          path: editors/vscode/z33-assembly.vsix

  marketplace:
    name: Publish to the extension marketplaces
    needs: [vsix]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    # The environment gives the OIDC token a ref-independent subject claim
    # (repo:…:environment:marketplace) for the Entra federated credential.
    environment: marketplace
    permissions:
      id-token: write # OIDC token for the Azure login

    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json

      # No build cache here: this job publishes a release artifact (zizmor: cache-poisoning)
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"

      # Only needed for the pinned vsce/ovsx CLIs in editors/vscode/'s devDependencies;
      # the extension itself is taken prebuilt from the vsix job's artifact.
      - name: Install dependencies
        run: pnpm i

      - name: Download the packaged extension
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vscode-extension
          path: editors/vscode

      # Trusted publishing: the `marketplace` environment's OIDC token is
      # exchanged for a Microsoft Entra credential (a user-assigned managed
      # identity that is a member of the quentin-gliech publisher). No
      # long-lived PAT — Azure DevOps retires those on 2026-12-01 anyway.
      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish to the Visual Studio Marketplace
        run: pnpm exec vsce publish --azure-credential --no-dependencies --packagePath z33-assembly.vsix
        working-directory: editors/vscode

      # Open VSX is optional: the step is skipped until an OVSX_PAT secret is
      # configured (requires an open-vsx.org account owning the
      # quentin-gliech namespace).
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: pnpm exec ovsx publish z33-assembly.vsix # zizmor: ignore[use-trusted-publishing]
        working-directory: editors/vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  zed:
    name: Build the Zed extension
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # No build cache here: this job produces a release artifact (zizmor: cache-poisoning)
      - name: Build the extension
        run: cargo build -p z33-zed --release --target wasm32-wasip1

      - name: Stage the compiled extension
        run: cp target/wasm32-wasip1/release/z33_zed.wasm z33-zed.wasm

      - name: Upload the extension wasm as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zed-extension
          path: z33-zed.wasm

  pages:
    name: Publish the web app on GitHub Pages
    runs-on: ubuntu-24.04
    # Only deploy from pushes to main; release-branch and tag dispatches of
    # this workflow skip the Pages deployment entirely.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write # Required by actions/upload-pages-artifact and actions/deploy-pages
      id-token: write # Required by actions/deploy-pages for OIDC

    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json

      # This workflow publishes release artifacts in other jobs, which trips
      # zizmor's cache-poisoning audit on setup-node's cache; the Pages deploy
      # itself is gated to pushes to main and ships no release artifact.
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node dependencies
        run: pnpm i
        working-directory: editors/web

      - name: Build the app
        run: pnpm run build
        working-directory: editors/web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "./editors/web/dist"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  publish:
    name: Publish a release
    needs: [build-linux, build-macos, build-windows, vsix, zed]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # Required by softprops/action-gh-release to create releases

    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check that the tag matches the project version
        run: |
          VERSION="$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" != "v$VERSION" ]; then
            echo "::error::tag $TAG does not match the project version $VERSION"
            exit 1
          fi

      - name: Download the artifacts from the previous job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Move the release assets
        run: |
          mv ./artifacts/{x86_64,aarch64}-{linux,macos,windows}/* ./
          mv ./artifacts/vscode-extension/z33-assembly.vsix ./artifacts/zed-extension/z33-zed.wasm ./

      - name: Generate the checksums
        run: sha256sum z33-cli-* z33-assembly.vsix z33-zed.wasm > SHA256SUMS

      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --verify-tag \
            --title "$TAG" \
            --generate-notes \
            --latest \
            z33-cli-x86_64-linux.tar.gz \
            z33-cli-aarch64-linux.tar.gz \
            z33-cli-x86_64-macos.tar.gz \
            z33-cli-aarch64-macos.tar.gz \
            z33-cli-x86_64-windows.exe \
            z33-cli-aarch64-windows.exe \
            z33-assembly.vsix \
            z33-zed.wasm \
            SHA256SUMS
