# $schema: https://www.schemastore.org/pnpm-workspace.json

packages:
  - editors/web
  - editors/vscode
  - tree-sitter-z33

ignoredBuiltDependencies:
  - "@playwright/browser-chromium"
  - esbuild
  - msw

onlyBuiltDependencies:
  - "@vscode/vsce-sign"
  - keytar
  - tree-sitter-cli
  - wasm-pack

strictDepBuilds: true

strictPeerDependencies: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - semver
  - reselect@5.1.1
