version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    ignore:
      # Must stay in sync with engines.vscode in editors/vscode/package.json:
      # vsce refuses to package when @types/vscode exceeds the engine floor.
      # Bump both together when raising the minimum VS Code version.
      - dependency-name: "@types/vscode"
