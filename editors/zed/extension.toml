id = "zorglub33"
name = "Zorglub33"
version = "0.8.3"
schema_version = 1
authors = ["Quentin Gliech <gliech@unistra.fr>"]
description = "Zorglub33 (Z33) assembly language support"
repository = "https://github.com/sandhose/z33-emulator"

[language_servers.zorglub33-lsp]
name = "Zorglub33 Language Server"
languages = ["Zorglub33 Assembly"]

[debug_adapters.zorglub33]
# Uses the default schema path: debug_adapter_schemas/zorglub33.json

# The tree-sitter grammar lives in this same repository under `tree-sitter-z33/`.
# Zed fetches the grammar from the repository at `rev` and compiles the
# `parser.c` found at `path`. `rev` is refreshed by scripts/set-version.sh on
# each release.
[grammars.z33]
repository = "https://github.com/sandhose/z33-emulator"
rev = "642b59588c60cfcf30320bff4ba4f33e85abfdf9"
path = "tree-sitter-z33"
