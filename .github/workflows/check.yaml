on:
  push:
    branches: [main]
  pull_request:
  # The Release workflow dispatches this one on release branches: PRs opened
  # with GITHUB_TOKEN don't trigger `pull_request` events, so the required
  # status checks have to be started explicitly.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

permissions:
  contents: read

name: Check

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check that all manifests agree on one version
        run: scripts/check-version-sync.sh

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run cargo test
        run: cargo test --workspace

  rustfmt:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # rustfmt.toml uses nightly-only options, so format checks run on nightly
      # regardless of the pinned toolchain in rust-toolchain.toml.
      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Run cargo fmt
        run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy lints
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run cargo clippy
        run: cargo clippy --workspace --all-targets

  deny:
    name: "`cargo deny` audit"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20

  lint:
    name: "oxlint + oxfmt check"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install dependencies
        run: pnpm i

      # Build the wasm once and reuse it for the vscode check: the web and
      # vscode `build:wasm` scripts differ only in `--out-dir`, so the output is
      # byte-identical. The copy also satisfies the vscode check's dist/pkg
      # exists-guard, avoiding a second wasm-pack build.
      - name: Build the wasm bindings
        run: pnpm --filter z33-web run build:wasm

      - name: Reuse the wasm bindings for the vscode extension
        run: |
          mkdir -p editors/vscode/dist
          cp -r editors/web/pkg editors/vscode/dist/pkg

      - name: Run lint and format check
        run: pnpm -r run check

      - name: Check for unused exports
        run: pnpm -r --filter './editors/web' knip

  e2e:
    name: "Playwright E2E tests"
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: editors/web
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install dependencies
        run: pnpm i

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: pnpm run e2e

      - name: Upload test report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            editors/web/playwright-report/
            editors/web/test-results/
          retention-days: 7

  tree-sitter:
    name: Tree-sitter grammar
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm i

      - name: Regenerate the parser
        run: pnpm --filter tree-sitter-z33 run generate

      - name: Ensure the committed parser is up to date
        run: git diff --exit-code tree-sitter-z33/src/

      - name: Run corpus tests
        run: pnpm --filter tree-sitter-z33 run test

  zed:
    name: Zed extension
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build the Zed extension
        run: cargo build -p z33-zed --target wasm32-wasip1

  editors-vim-nvim:
    name: "Vim & Neovim plugins smoke test"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Neovim
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1.6.1
        with:
          neovim: true
          version: stable

      - name: Install classic Vim
        run: sudo apt-get update && sudo apt-get install -y vim

      - name: Neovim smoke test
        run: nvim --headless -u NONE -N -l editors/nvim/tests/smoke.lua

      - name: Vim smoke test
        run: |
          cat > /tmp/z33-vim-smoke.vim <<'VIMSCRIPT'
          " CI smoke test for the classic Vim plugin (editors/vim/): just
          " enough to catch "plugin doesn't even load" regressions --
          " ftdetect + syntax must both engage on a real Z33 sample.
          set rtp+=editors/vim
          filetype plugin indent on
          syntax on
          edit samples/fact.s
          if &filetype !=# 'z33'
            call writefile(['FAIL: expected filetype z33, got: ' . &filetype], '/tmp/z33-vim-smoke-result.txt')
            cquit 1
          endif
          if !exists('b:current_syntax') || b:current_syntax !=# 'z33'
            call writefile(['FAIL: expected syntax z33, got: ' . get(b:, 'current_syntax', '<unset>')], '/tmp/z33-vim-smoke-result.txt')
            cquit 1
          endif
          call writefile(['OK: filetype=' . &filetype . ' syntax=' . b:current_syntax], '/tmp/z33-vim-smoke-result.txt')
          qall!
          VIMSCRIPT
          vim -es -N -u NONE -S /tmp/z33-vim-smoke.vim
          cat /tmp/z33-vim-smoke-result.txt

  zizmor:
    name: Audit GitHub Actions
    runs-on: ubuntu-24.04
    permissions:
      security-events: write # Required for SARIF upload to GitHub Security tab
    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
